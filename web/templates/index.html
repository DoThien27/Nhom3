<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Club Pro | Hệ Thống Quản Lý CLB Thể Thao</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#fff7ed', 100: '#ffedd5', 200: '#fed7aa', 300: '#fdba74',
                            400: '#fb923c', 500: '#f97316', 600: '#ea580c', 700: '#c2410c',
                            800: '#9a3412', 900: '#7c2d12', 950: '#431407',
                        },
                        darkbg: '#020617',
                        darkcard: '#0f172a',
                        darkborder: '#1e293b',
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/static/css/main.css">
    <style>
        [v-cloak] { display: none; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); }
        .orange-gradient { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); }
        .sidebar-item-active { background: linear-gradient(90deg, rgba(249, 115, 22, 0.15) 0%, rgba(249, 115, 22, 0) 100%); border-left: 4px solid #f97316; color: #f97316; }
        
        .btn-primary { @apply orange-gradient px-5 py-2.5 rounded-xl text-white font-bold text-xs uppercase shadow-lg hover:opacity-90 active:scale-95 transition-all; }
        .btn-gray { @apply bg-slate-800 px-5 py-2.5 rounded-xl text-white font-bold text-xs uppercase hover:bg-slate-700 active:scale-95 transition-all; }
        .lbl { @apply text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-1.5; }
        .form-input { @apply w-full bg-slate-900/50 border border-slate-700/50 rounded-xl py-3 px-4 text-white focus:outline-none focus:ring-2 focus:ring-primary-500/50 focus:border-primary-500 transition-all text-sm; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #334155; }
    </style>
</head>
<body class="bg-darkbg text-slate-200 font-sans selection:bg-primary-500/30">

    <!-- ─── LOGIN PAGE ────────────────────────────────────────────────────────── -->
    <div id="login-page" class="hidden min-h-screen flex items-center justify-center relative overflow-hidden bg-black">
        <!-- Background Image with Overlay -->
        <div class="absolute inset-0 z-0">
            <img src="/static/images/login-bg.png" alt="Gym Background" class="w-full h-full object-cover opacity-60">
            <div class="absolute inset-0 bg-gradient-to-t from-darkbg via-darkbg/40 to-transparent"></div>
        </div>

        <!-- Login Card -->
        <div class="relative z-10 w-full max-w-md p-8 glass border border-white/10 rounded-3xl shadow-2xl mx-4 transform transition-all hover:scale-[1.01]">
            <div class="flex justify-center mb-8">
                <div class="w-20 h-20 orange-gradient rounded-2xl flex items-center justify-center shadow-lg shadow-primary-500/30">
                    <i data-lucide="trophy" class="w-10 h-10 text-white"></i>
                </div>
            </div>
            <h1 class="text-3xl font-extrabold text-center mb-2 tracking-tight text-white uppercase">Sports Club <span class="text-primary-500">Pro</span></h1>
            <p class="text-slate-400 text-center mb-8">Chào mừng bạn quay trở lại CLB</p>

            <form id="login-form" onsubmit="handleLogin(event)" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Tên đăng nhập</label>
                    <div class="relative group">
                        <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500 group-focus-within:text-primary-500 transition-colors"></i>
                        <input type="text" id="login-username" required 
                            class="w-full bg-slate-900/50 border border-slate-700/50 rounded-xl py-3.5 pl-12 pr-4 text-white focus:outline-none focus:ring-2 focus:ring-primary-500/50 focus:border-primary-500 transition-all"
                            placeholder="Nhập tên đăng nhập">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Mật khẩu</label>
                    <div class="relative group">
                        <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500 group-focus-within:text-primary-500 transition-colors"></i>
                        <input type="password" id="login-password" required
                            class="w-full bg-slate-900/50 border border-slate-700/50 rounded-xl py-3.5 pl-12 pr-12 text-white focus:outline-none focus:ring-2 focus:ring-primary-500/50 focus:border-primary-500 transition-all"
                            placeholder="••••••••">
                        <button type="button" onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300">
                            <i data-lucide="eye" id="eye-icon" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
                
                <div id="login-error" class="hidden p-4 bg-red-500/10 border border-red-500/20 rounded-xl text-red-400 text-sm text-center"></div>

                <button type="submit" id="login-btn" class="w-full orange-gradient hover:opacity-90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary-500/20 transition-all active:scale-[0.98] flex items-center justify-center gap-2 group">
                    <span id="login-btn-text">Đăng Nhập</span>
                    <i data-lucide="arrow-right" class="w-5 h-5 group-hover:translate-x-1 transition-transform"></i>
                    <div id="login-spinner" class="hidden w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                </button>
            </form>
            
            <p class="mt-8 text-center text-xs text-slate-500">© 2024 Sports Club Management. All rights reserved.</p>
        </div>
    </div>

    <!-- ─── MAIN APP ────────────────────────────────────────────────────────── -->
    <div id="main-app" class="hidden flex h-screen bg-darkbg">
        <!-- Sidebar -->
        <aside id="sidebar" class="w-72 bg-darkcard border-r border-darkborder flex flex-col transition-all duration-300 z-50 overflow-hidden">
            <div class="p-6 flex items-center gap-3">
                <div class="w-10 h-10 orange-gradient rounded-xl flex items-center justify-center shrink-0">
                    <i data-lucide="activity" class="w-6 h-6 text-white"></i>
                </div>
                <span class="text-xl font-bold tracking-tight text-white whitespace-nowrap logo-text">SPORTS <span class="text-primary-500">PRO</span></span>
            </div>

            <nav id="sidebar-nav" class="flex-1 mt-6 space-y-1 px-3 overflow-y-auto custom-scrollbar">
                <!-- Nav items generated here -->
            </nav>

            <div class="p-4 border-t border-darkborder">
                <button onclick="confirmLogout()" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-red-500/10 hover:text-red-400 transition-all group">
                    <i data-lucide="log-out" class="w-5 h-5 group-hover:-translate-x-1 transition-transform"></i>
                    <span class="font-medium">Đăng xuất</span>
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 flex flex-col relative overflow-hidden">
            <!-- Top Bar -->
            <header class="h-20 bg-darkcard/50 backdrop-blur-md border-b border-darkborder flex items-center justify-between px-8 z-40">
                <div class="flex items-center gap-4 flex-1">
                    <button onclick="toggleSidebar()" class="p-2 rounded-lg hover:bg-slate-800 text-slate-400 transition-colors">
                        <i data-lucide="menu" class="w-6 h-6"></i>
                    </button>
                    <h2 id="page-title" class="text-xl font-bold text-white whitespace-nowrap">Dashboard</h2>
                    
                    <div class="hidden sm:flex relative ml-6 md:w-80 transition-all group">
                        <i data-lucide="search" class="w-4 h-4 absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary-500 transition-colors"></i>
                        <input type="text" id="global-search" onkeyup="handleGlobalSearch(this.value)" placeholder="Tìm kiếm nhanh trong trang..." class="w-full bg-slate-900/50 border border-slate-700/50 rounded-xl py-2.5 pl-11 pr-4 text-slate-200 placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-primary-500/50 focus:border-primary-500 focus:bg-slate-800 transition-all text-sm">
                    </div>
                </div>

                <div class="flex items-center gap-6">
                    <div id="current-date" class="text-sm text-slate-400 hidden sm:block"></div>
                    <div class="h-10 w-[1px] bg-darkborder mx-2"></div>
                    <div class="flex items-center gap-4 group cursor-pointer">
                        <div class="text-right">
                            <div id="user-name" class="text-sm font-semibold text-white">Admin</div>
                            <div id="user-role" class="text-[10px] uppercase tracking-wider text-primary-500 font-bold">Quản trị viên</div>
                        </div>
                        <div id="user-avatar" class="w-12 h-12 orange-gradient rounded-full flex items-center justify-center text-white font-bold text-lg border-2 border-darkborder shadow-lg shadow-primary-500/10">
                            A
                        </div>
                    </div>
                </div>
            </header>

            <!-- Page Content Wrapper -->
            <div id="page-content" class="flex-1 overflow-y-auto p-8 custom-scrollbar">
                <!-- Dynamic Content Load -->
            </div>
        </main>
    </div>

    <!-- ─── MODALS & TOASTS ──────────────────────────────────────────────────── -->
    <div id="modal-overlay" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 transition-all duration-300" onclick="closeModalOnOverlay(event)">
        <div id="modal-container" class="bg-darkcard border border-darkborder w-full max-w-2xl rounded-3xl shadow-2xl transform transition-all duration-300 scale-95 opacity-0 overflow-hidden">
            <!-- Modal content here -->
        </div>
    </div>

    <div id="logout-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[110] flex items-center justify-center p-4">
        <div class="bg-darkcard border border-darkborder p-8 rounded-3xl shadow-2xl max-w-sm w-full text-center">
            <div class="w-16 h-16 bg-red-500/10 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="log-out" class="w-8 h-8"></i>
            </div>
            <h3 class="text-xl font-bold text-white mb-2">Đăng xuất?</h3>
            <p class="text-slate-400 mb-8">Bạn có chắc chắn muốn rời khỏi hệ thống quản lý?</p>
            <div class="flex gap-4">
                <button onclick="closeLogoutModal()" class="flex-1 py-3 px-4 rounded-xl bg-slate-800 text-white font-bold hover:bg-slate-700 transition-colors">Hủy</button>
                <button onclick="doLogout()" class="flex-1 py-3 px-4 rounded-xl bg-red-500 text-white font-bold hover:bg-red-600 transition-colors shadow-lg shadow-red-500/20">Xác nhận</button>
            </div>
        </div>
    </div>

    <div id="toast-container" class="fixed bottom-8 right-8 z-[120] flex flex-col gap-4"></div>

    <!-- Core Scripts -->
    <script src="/static/js/api.js"></script>
    <script src="/static/js/utils.js"></script>
    <script src="/static/js/renderers.js"></script>
    <script src="/static/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initApp();
            lucide.createIcons();
        });
    </script>
</body>
</html>
